<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Mirage Casino</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="profile.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand">Mirage Casino</a>
      <div class="balance-pill">
        <div class="label">Balance</div>
        <div class="value num" id="sidebar-balance">—</div>
      </div>
      <nav class="nav-links">
        <a href="/crash.html">Crash</a>
        <a href="/mines.html">Mines</a>
        <a href="/blackjack.html">Blackjack</a>
        <a href="/crates.html">Crates</a>
        <a href="/leaderboards.html">Leaderboards</a>
        <a href="/profile.html">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sidebar-name"></span>
        <button class="btn-ghost" id="sidebar-logout">Log out</button>
      </div>
    </aside>

    <main class="content">
      <h1 id="profile-name">Profile</h1>
      <p class="eyebrow">Statistics &amp; achievements</p>

      <h2 class="section-title">Statistics</h2>
      <div id="stats-grid" class="stats-grid"></div>

      <h2 class="section-title">Achievements</h2>
      <div id="achievements-list" class="achievements-grid"></div>
    </main>
  </div>

  <script src="shell.js"></script>
  <script src="profile.js"></script>
</body>
</html>
