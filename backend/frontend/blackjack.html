<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack — Mirage Casino</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="blackjack.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand">Mirage Casino</a>
      <div class="balance-pill">
        <div class="label">Balance</div>
        <div class="value num" id="sidebar-balance">—</div>
      </div>
      <nav class="nav-links">
        <a href="/crash.html">Crash</a>
        <a href="/mines.html">Mines</a>
        <a href="/blackjack.html">Blackjack</a>
        <a href="/crates.html">Crates</a>
        <a href="/leaderboards.html">Leaderboards</a>
        <a href="/profile.html">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sidebar-name"></span>
        <button class="btn-ghost" id="sidebar-logout">Log out</button>
      </div>
    </aside>

    <main class="content">
      <h1>Blackjack</h1>
      <p class="eyebrow">Dealer stands on all 17s</p>

      <div class="card bj-board">
        <div class="bj-controls">
          <div>
            <label for="bet-amount">Bet (€)</label>
            <input type="number" id="bet-amount" min="1" step="0.01" value="10.00">
          </div>
          <button id="start-btn" class="btn-primary">Deal</button>
        </div>

        <section class="bj-section">
          <h2>Dealer <span id="dealer-value" class="hand-value"></span></h2>
          <div id="dealer-hand" class="bj-hand"></div>
        </section>

        <section id="hands-container" class="bj-hands"></section>

        <div class="bj-actions">
          <button id="hit-btn" disabled>Hit</button>
          <button id="stand-btn" disabled>Stand</button>
          <button id="double-btn" disabled title="Double your bet, draw exactly one more card, then stand">Double</button>
          <button id="split-btn" disabled title="Split two matching cards into two separate hands, each with its own bet">Split</button>
          <button id="insure-yes-btn" class="btn-gold" disabled title="Side bet (half your original bet) that pays 3x if the dealer has blackjack — only offered when the dealer shows an Ace">Buy insurance</button>
          <button id="insure-no-btn" class="btn-ghost" disabled>Decline insurance</button>
        </div>

        <p id="bj-message" class="message" role="status"></p>
      </div>
    </main>
  </div>

  <script src="shell.js"></script>
  <script src="blackjack.js"></script>
</body>
</html>
