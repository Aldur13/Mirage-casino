<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboards — Mirage Casino</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="leaderboards.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand">Mirage Casino</a>
      <div class="balance-pill">
        <div class="label">Balance</div>
        <div class="value num" id="sidebar-balance">—</div>
      </div>
      <nav class="nav-links">
        <a href="/crash.html" class="nav-link"><span class="nav-icon">🚀</span>Crash</a>
        <a href="/mines.html" class="nav-link"><span class="nav-icon">💣</span>Mines</a>
        <a href="/blackjack.html" class="nav-link"><span class="nav-icon">🃏</span>Blackjack</a>
        <a href="/crates.html" class="nav-link"><span class="nav-icon">🎁</span>Crates</a>
        <a href="/chicken.html" class="nav-link"><span class="nav-icon">🐔</span>Chicken Road</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/leaderboards.html" class="nav-link footer-link">Leaderboards</a>
        <a href="/profile.html" class="nav-link footer-link">Profile</a>
        <span id="sidebar-name"></span>
        <button class="btn-ghost" id="sidebar-logout">Log out</button>
      </div>
    </aside>

    <main class="content">
      <h1>Leaderboards</h1>
      <p class="eyebrow">Rankings across every game</p>

      <select id="board-select">
        <option value="richest">Richest Players</option>
        <option value="biggest-win">Biggest Win</option>
        <option value="most-profit">Most Profit</option>
        <option value="most-wagered">Most Wagered</option>
        <option value="most-games-played">Most Games Played</option>
        <option value="biggest-crash-cashout">Biggest Crash Cashout</option>
        <option value="most-legendary-items">Most Legendary Items</option>
        <option value="daily-winners">Daily Winners</option>
        <option value="weekly-winners">Weekly Winners</option>
        <option value="monthly-winners">Monthly Winners</option>
      </select>

      <div class="card board-card">
        <ol id="board-list" class="board-list"></ol>
      </div>
    </main>
  </div>

  <script src="shell.js"></script>
  <script src="leaderboards.js"></script>
</body>
</html>
