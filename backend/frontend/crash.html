<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash — Mirage Casino</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="crash.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand">Mirage Casino</a>
      <div class="balance-pill">
        <div class="label">Balance</div>
        <div class="value num" id="sidebar-balance">—</div>
      </div>
      <nav class="nav-links">
        <a href="/crash.html" class="nav-link"><span class="nav-icon">🚀</span>Crash</a>
        <a href="/mines.html" class="nav-link"><span class="nav-icon">💣</span>Mines</a>
        <a href="/blackjack.html" class="nav-link"><span class="nav-icon">🃏</span>Blackjack</a>
        <a href="/crates.html" class="nav-link"><span class="nav-icon">🎁</span>Crates</a>
        <a href="/chicken.html" class="nav-link"><span class="nav-icon">🐔</span>Chicken Road</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/leaderboards.html" class="nav-link footer-link">Leaderboards</a>
        <a href="/profile.html" class="nav-link footer-link">Profile</a>
        <span id="sidebar-name"></span>
        <button class="btn-ghost" id="sidebar-logout">Log out</button>
      </div>
    </aside>

    <main class="content">
      <h1>Crash</h1>
      <p class="eyebrow">Shared live round · provably fair</p>

      <div class="crash-layout">
        <section class="card crash-board">
          <div id="multiplier" class="multiplier num">1.00x</div>
          <svg id="crash-graph" class="crash-graph" viewBox="0 0 300 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="crash-graph-grad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#7c83ff" />
                <stop offset="50%" stop-color="#9b5bf5" />
                <stop offset="100%" stop-color="#35c7e6" />
              </linearGradient>
            </defs>
            <polyline id="crash-line" points="" />
          </svg>
          <div id="phase-banner" class="phase-banner"></div>
          <div class="bet-controls">
            <div>
              <label for="bet-amount">Bet (€)</label>
              <input type="number" id="bet-amount" min="1" step="0.01" value="10.00">
            </div>
            <div>
              <label for="auto-cashout">Auto cashout (×)</label>
              <input type="number" id="auto-cashout" placeholder="optional" min="1.01" step="0.01">
            </div>
            <button id="bet-btn" class="btn-primary">Place bet</button>
            <button id="cashout-btn" class="btn-gold" disabled>Cash out</button>
          </div>
          <p id="crash-message" class="message" role="status"></p>

          <div class="crash-history">
            <h2>Recent crashes</h2>
            <ul id="recent-crashes" class="chip-row"></ul>
          </div>
        </section>

        <section class="crash-side">
          <div class="card side-panel">
            <h2>Players this round</h2>
            <ul id="player-list" class="row-list"></ul>
          </div>
          <div class="card side-panel">
            <h2>Provably fair</h2>
            <p class="fair-row">Hash <code id="seed-hash">—</code></p>
            <p id="seed-reveal" class="fair-row"></p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="shell.js"></script>
  <script src="crash.js"></script>
</body>
</html>
