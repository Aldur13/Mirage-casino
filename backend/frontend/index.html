<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage Casino</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>
  <main class="auth-hero">
    <div class="auth-wrap">
      <div class="brand auth-brand">Mirage Casino</div>
      <p class="auth-tagline">Provably fair. Every round.</p>

      <section id="auth-forms" class="auth-forms">
        <form id="login-form" class="card auth-card">
          <h2>Log in</h2>
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="Password" required>
          <button type="submit" class="btn-primary">Log in</button>
        </form>

        <form id="register-form" class="card auth-card">
          <h2>Create account</h2>
          <label for="register-name">Full name</label>
          <input type="text" id="register-name" name="name" placeholder="Full name" required>
          <label for="register-email">Email</label>
          <input type="email" id="register-email" name="email" placeholder="you@example.com" required>
          <label for="register-password">Password</label>
          <input type="password" id="register-password" name="password" placeholder="Min. 8 characters" required minlength="8">
          <button type="submit" class="btn-primary">Create account</button>
        </form>
      </section>

      <section id="dashboard" class="card auth-card lobby-card" hidden>
        <h2>Welcome, <span id="user-name"></span></h2>
        <p class="eyebrow">Balance</p>
        <p class="num" id="balance" style="font-size: 1.8rem; font-weight: 700;"></p>

        <h3 class="section-title lobby-heading">Choose a game</h3>
        <div class="game-lobby-grid">
          <a class="game-tile" href="/crash.html">
            <div class="game-tile-icon">🚀</div>
            <div class="game-tile-name">Crash</div>
            <div class="game-tile-desc">Cash out before it pops</div>
          </a>
          <a class="game-tile" href="/mines.html">
            <div class="game-tile-icon">💣</div>
            <div class="game-tile-name">Mines</div>
            <div class="game-tile-desc">Reveal tiles, dodge the mines</div>
          </a>
          <a class="game-tile" href="/blackjack.html">
            <div class="game-tile-icon">🃏</div>
            <div class="game-tile-name">Blackjack</div>
            <div class="game-tile-desc">Beat the dealer to 21</div>
          </a>
          <a class="game-tile" href="/crates.html">
            <div class="game-tile-icon">🎁</div>
            <div class="game-tile-name">Crates</div>
            <div class="game-tile-desc">Open crates, win items</div>
          </a>
        </div>

        <div class="lobby-footer">
          <a class="btn-ghost" href="/leaderboards.html">Leaderboards</a>
          <a class="btn-ghost" href="/profile.html">Profile</a>
          <button id="logout-btn" class="btn-ghost">Log out</button>
        </div>
      </section>

      <p id="message" class="message" role="status"></p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
