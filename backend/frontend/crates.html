<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crates — Mirage Casino</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="crates.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand">Mirage Casino</a>
      <div class="balance-pill">
        <div class="label">Balance</div>
        <div class="value num" id="sidebar-balance">—</div>
      </div>
      <nav class="nav-links">
        <a href="/crash.html" class="nav-link"><span class="nav-icon">🚀</span>Crash</a>
        <a href="/mines.html" class="nav-link"><span class="nav-icon">💣</span>Mines</a>
        <a href="/blackjack.html" class="nav-link"><span class="nav-icon">🃏</span>Blackjack</a>
        <a href="/crates.html" class="nav-link"><span class="nav-icon">🎁</span>Crates</a>
        <a href="/chicken.html" class="nav-link"><span class="nav-icon">🐔</span>Chicken Road</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/leaderboards.html" class="nav-link footer-link">Leaderboards</a>
        <a href="/profile.html" class="nav-link footer-link">Profile</a>
        <span id="sidebar-name"></span>
        <button class="btn-ghost" id="sidebar-logout">Log out</button>
      </div>
    </aside>

    <main class="content">
      <h1>Crates</h1>
      <p class="eyebrow">Odds are exact — no "rare!", just the real percentage</p>

      <div class="crates-controls">
        <label class="auto-sell-toggle">
          <input type="checkbox" id="auto-sell-checkbox">
          Auto-sell items the instant I open them
        </label>

        <div class="qty-selector" id="qty-selector" role="group" aria-label="Open quantity">
          <span class="qty-label">Open</span>
          <button type="button" class="qty-btn active" data-qty="1">1x</button>
          <button type="button" class="qty-btn" data-qty="10">10x</button>
          <button type="button" class="qty-btn" data-qty="25">25x</button>
          <button type="button" class="qty-btn" data-qty="50">50x</button>
        </div>
      </div>

      <section>
        <h2 class="section-title">Available crates</h2>
        <div id="crate-list" class="crate-grid"></div>
      </section>

      <p id="crates-message" class="message" role="status"></p>

      <section>
        <h2 class="section-title">Your inventory</h2>
        <div id="inventory-list" class="crate-grid"></div>
      </section>
    </main>
  </div>

  <div id="spin-overlay" class="spin-overlay" hidden>
    <div class="spin-modal card">
      <div class="spin-viewport" id="spin-viewport">
        <div class="spin-pointer"></div>
        <div class="spin-track" id="spin-track"></div>
      </div>
      <div class="spin-batch-info" id="spin-batch-info" hidden>
        <span id="spin-batch-progress" class="num"></span>
        <button type="button" class="btn-danger" id="spin-batch-stop">Stop</button>
      </div>
      <div class="spin-result" id="spin-result" hidden>
        <div class="spin-result-name" id="spin-result-name"></div>
        <div class="spin-result-value num" id="spin-result-value"></div>
        <div class="spin-result-actions" id="spin-result-actions"></div>
      </div>
    </div>
  </div>

  <script src="shell.js"></script>
  <script src="crates.js"></script>
</body>
</html>
