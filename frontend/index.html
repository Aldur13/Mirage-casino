<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage Casino</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mirage Casino</h1>
    <p class="subtitle">Phase 2 — <a href="/crash.html">play Crash</a></p>
  </header>

  <main>
    <section id="auth-forms">
      <form id="login-form">
        <h2>Log in</h2>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Log in</button>
      </form>

      <form id="register-form">
        <h2>Register</h2>
        <input type="text" name="name" placeholder="Full name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password (min 8 chars)" required minlength="8">
        <button type="submit">Register</button>
      </form>
    </section>

    <section id="dashboard" hidden>
      <h2>Welcome, <span id="user-name"></span></h2>
      <p>Balance: <strong id="balance"></strong></p>
      <button id="logout-btn">Log out</button>
    </section>

    <p id="message" role="status"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
