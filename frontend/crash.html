<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash — Mirage Casino</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="crash.css">
</head>
<body>
  <header>
    <h1>Crash</h1>
    <p class="subtitle"><a href="/">&larr; Mirage Casino</a></p>
  </header>

  <main class="crash-main">
    <section class="crash-board">
      <div id="multiplier" class="multiplier">1.00x</div>
      <div id="phase-banner" class="phase-banner"></div>
      <div class="bet-controls">
        <input type="number" id="bet-amount" placeholder="Bet (cents)" min="100" value="1000">
        <input type="number" id="auto-cashout" placeholder="Auto cashout (optional, e.g. 2.00)" min="1.01" step="0.01">
        <button id="bet-btn">Place bet</button>
        <button id="cashout-btn" disabled>Cash out</button>
      </div>
      <p id="crash-message" role="status"></p>
    </section>

    <section class="crash-side">
      <div>
        <h2>Players this round</h2>
        <ul id="player-list"></ul>
      </div>
      <div>
        <h2>Recent crashes</h2>
        <ul id="recent-crashes"></ul>
      </div>
      <div>
        <h2>Provably fair</h2>
        <p>Hash: <code id="seed-hash">—</code></p>
        <p id="seed-reveal"></p>
      </div>
    </section>
  </main>

  <script src="crash.js"></script>
</body>
</html>
